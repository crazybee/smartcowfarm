---
# roles/deploy_functions/tasks/main.yml
# Updates the Functions app container image and restarts it.

- name: Update Functions app container image tag
  ansible.builtin.command: >
    az functionapp config container set
      --name {{ functions_app_name }}
      --resource-group {{ azure_resource_group }}
      --image {{ acr_login_server }}/{{ backend_image_name }}:{{ image_tag }}
      --registry-server https://{{ acr_login_server }}
      --registry-username {{ acr_admin_username }}
      --registry-password {{ acr_admin_password }}
  no_log: true
  changed_when: true

- name: Restart Functions app to pull the new image
  ansible.builtin.command: >
    az functionapp restart
      --name {{ functions_app_name }}
      --resource-group {{ azure_resource_group }}
  changed_when: true

- name: Wait for Functions app to become healthy
  ansible.builtin.uri:
    url: "https://{{ functions_app_name }}.azurewebsites.net/api/health"
    method: GET
    status_code: [200, 204]
    validate_certs: true
  register: health_check
  until: health_check.status in [200, 204]
  retries: "{{ smoke_test_retries }}"
  delay: "{{ smoke_test_delay }}"
  ignore_errors: true   # don't fail if no /api/health endpoint; smoke test covers it
